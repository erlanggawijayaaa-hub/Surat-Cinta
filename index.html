<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Letter for You</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Lora:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Lora', serif; 
            overflow: hidden;
            color: #e6edf3;
        }

        .card {
            background-color: #161b22;
            padding: 35px 25px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            width: 90%;
            max-width: 450px;
            max-height: 90vh; 
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            align-items: center; 
            border: 1px solid #30363d;
            animation: fadeIn 1.5s ease-in-out;
            position: relative;
            z-index: 10;
        }

        .card::-webkit-scrollbar { display: none; }
        .card { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- HIASAN BUNGA DI 4 SUDUT --- */
        .corner-decor {
            position: absolute;
            width: 50px;
            opacity: 0.6; /* Transparan agar teks tetap jelas */
            pointer-events: none;
            z-index: 1; /* Posisi di belakang teks */
        }
        .top-left {
            top: 20px;
            left: 20px;
            transform: rotate(-20deg);
        }
        .top-right {
            top: 20px;
            right: 20px;
            transform: rotate(20deg);
        }
        .bottom-left {
            bottom: 20px;
            left: 20px;
            transform: rotate(-110deg);
        }
        .bottom-right {
            bottom: 20px;
            right: 20px;
            transform: rotate(110deg);
        }

        /* Memastikan teks dan foto berada di atas bunga */
        .header, h1, .content, .signature, .photo-frame {
            position: relative;
            z-index: 5;
        }

        .header {
            font-style: italic;
            color: #8b949e;
            font-size: 0.9em;
            margin-bottom: 20px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 15px;
            width: 100%;
            min-height: 20px;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: #e6edf3;
            font-size: 1.6em;
            margin-bottom: 15px;
            min-height: 30px;
            text-align: center;
        }

        .photo-frame {
            width: 100%;
            max-width: 220px;
            border-radius: 10px;
            margin: 10px 0 20px 0;
            border: 2px solid #30363d;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            opacity: 0; 
            animation: fadeInPhoto 2s ease-in-out 1.5s forwards; 
        }

        @keyframes fadeInPhoto {
            to { opacity: 1; }
        }

        .content {
            color: #c9d1d9;
            line-height: 1.8;
            font-size: 1.1em;
            text-align: justify; 
            white-space: pre-wrap; 
            width: 100%;
            min-height: 180px;
        }

        .signature {
            margin-top: 30px;
            color: #f0f6fc;
            font-weight: bold;
            font-size: 1.3em;
            font-family: 'Brush Script MT', cursive;
            width: 100%;
            text-align: center;
            min-height: 25px;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            background-color: #e6edf3;
            animation: blink 0.75s step-end infinite;
            margin-left: 2px;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        .flower {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 5;
            animation-name: fall;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            will-change: transform, opacity;
        }

        @keyframes fall {
            0% { transform: translateY(-100%) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg) translateX(20px); opacity: 0; }
        }

        .pokemon {
            position: absolute;
            bottom: 15px; 
            left: -100px; 
            width: 60px; 
            z-index: 20; 
            animation: runAcross 12s linear infinite; 
            pointer-events: none;
        }

        @keyframes runAcross {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(100vw + 100px)); } 
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f338.svg" class="corner-decor top-left" alt="bunga">
        <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f338.svg" class="corner-decor top-right" alt="bunga">
        <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f338.svg" class="corner-decor bottom-left" alt="bunga">
        <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f338.svg" class="corner-decor bottom-right" alt="bunga">

        <div class="header" id="text1"></div>
        <h1 id="text2"></h1>
        
        <img src="foto_ayya.jpg" alt="Our Memory" class="photo-frame">

        <div class="content" id="text3"></div>
        <div class="signature" id="text4"></div>
    </div>

    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/25.gif" class="pokemon" alt="Pikachu Berlari">

    <script>
        const textData = [
            { id: 'text1', text: "Just a Little Something for You", speed: 60 },
            { id: 'text2', text: "Dearest, Ayya", speed: 80 },
            { id: 'text3', text: "Tahu nggak bedanya kamu sama cuaca? Kalau cuaca bisa berubah-ubah, kalau kamu... please jangan pernah berubah ya.\n\nTetap jadi Ayya yang aku kenal sekarang. Aku bersyukur banget bisa bareng sama kamu, dan jujur aku udah nggak sabar buat coret semua bucket list kencan kita bareng-bareng. Stay exactly as you are, karena versi kamu yang ini udah kelewat sempurna buat aku.", speed: 45 },
            { id: 'text4', text: "Your biggest fan, El", speed: 70 }
        ];

        async function typeWriter() {
            await new Promise(r => setTimeout(r, 1000));

            for (let i = 0; i < textData.length; i++) {
                const el = document.getElementById(textData[i].id);
                const txt = textData[i].text;
                const speed = textData[i].speed;

                const cursor = document.createElement('span');
                cursor.className = 'cursor';
                cursor.innerHTML = '&nbsp;'; 
                el.appendChild(cursor);

                for (let j = 0; j < txt.length; j++) {
                    const charNode = document.createTextNode(txt.charAt(j));
                    el.insertBefore(charNode, cursor);
                    await new Promise(r => setTimeout(r, speed));
                }
                
                if (i < textData.length - 1) {
                    cursor.remove();
                    await new Promise(r => setTimeout(r, 400)); 
                }
            }
        }

        function createFlower() {
            const flower = document.createElement('span');
            flower.className = 'flower';
            const flowers = ['🌸', '🏵️', '🌺', '🌻', '🍃', '💮'];
            flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];

            const startX = Math.random() * window.innerWidth;
            flower.style.left = `${startX}px`;

            const size = Math.random() * (25 - 10) + 10;
            flower.style.fontSize = `${size}px`;
            flower.style.opacity = Math.random() * (0.9 - 0.4) + 0.4;

            const duration = Math.random() * (12 - 6) + 6;
            flower.style.animationDuration = `${duration}s`;

            const delay = Math.random() * 5;
            flower.style.animationDelay = `${delay}s`;

            document.body.appendChild(flower);

            setTimeout(() => {
                flower.remove();
            }, (duration + delay) * 1000);
        }

        typeWriter();
        setInterval(createFlower, 400);
    </script>

</body>
</html>
