<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Letter for You</title>
    <style>
        /* Gaya dasar latar belakang */
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Times New Roman', serif;
            overflow: hidden;
            color: #e6edf3;
        }

        /* Kontainer surat */
        .card {
            background-color: #161b22;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            max-width: 350px;
            width: 80%;
            text-align: center;
            border: 1px solid #30363d;
            animation: fadeIn 1.5s ease-in-out;
            position: relative;
            z-index: 10;
            min-height: 300px; /* Menjaga ukuran kotak agar tidak lompat-lompat */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Gaya teks */
        .header {
            font-style: italic;
            color: #8b949e;
            font-size: 0.9em;
            margin-bottom: 20px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
            min-height: 20px;
        }

        h1 {
            color: #e6edf3;
            font-size: 1.5em;
            margin-bottom: 10px;
            min-height: 30px;
        }

        .content {
            color: #c9d1d9;
            line-height: 1.8;
            font-size: 1.1em;
            text-align: left;
            white-space: pre-wrap; /* Penting untuk efek enter/baris baru */
            min-height: 150px;
        }

        .signature {
            margin-top: 30px;
            color: #f0f6fc;
            font-weight: bold;
            font-size: 1.2em;
            font-family: 'Brush Script MT', cursive;
            min-height: 25px;
        }

        /* Efek kursor berkedip */
        .cursor {
            display: inline-block;
            width: 2px;
            background-color: #e6edf3;
            animation: blink 0.75s step-end infinite;
            margin-left: 2px;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Animasi Bunga */
        .flower {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 5;
            animation-name: fall;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            will-change: transform, opacity;
        }

        @keyframes fall {
            0% { transform: translateY(-100%) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg) translateX(20px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header" id="text1"></div>
        <h1 id="text2"></h1>
        <div class="content" id="text3"></div>
        <div class="signature" id="text4"></div>
    </div>

    <script>
        // --- JAVASCRIPT UNTUK EFEK MESIN TIK ---
        // Kamu bisa mengedit pesannya di bagian 'text' ini jika mau
        const textData = [
            { id: 'text1', text: "Another Year of You", speed: 60 },
            { id: 'text2', text: "Dearest, Ayya", speed: 80 },
            { id: 'text3', text: "Happy birthday!\n\nGak kerasa ya udah ganti chapter lagi hari ini. Di momen spesial ini, aku cuma mau bilang kalau aku bersyukur banget ada kamu. Semoga di umur yang baru ini, kamu dapet lebih banyak momen yang bikin kamu ketawa lepas, makin sedikit overthinking-nya, dan selalu didekatkan sama hal-hal baik.", speed: 45 },
            { id: 'text4', text: "Your biggest fan, El", speed: 70 }
        ];

        async function typeWriter() {
            // Tunggu 1 detik agar animasi kotak selesai dulu sebelum ngetik
            await new Promise(r => setTimeout(r, 1000));

            for (let i = 0; i < textData.length; i++) {
                const el = document.getElementById(textData[i].id);
                const txt = textData[i].text;
                const speed = textData[i].speed;

                // Tambahkan kursor
                const cursor = document.createElement('span');
                cursor.className = 'cursor';
                cursor.innerHTML = '&nbsp;'; // spasi kosong agar kursor memiliki tinggi
                el.appendChild(cursor);

                // Proses mengetik huruf satu per satu
                for (let j = 0; j < txt.length; j++) {
                    const charNode = document.createTextNode(txt.charAt(j));
                    el.insertBefore(charNode, cursor);
                    await new Promise(r => setTimeout(r, speed));
                }
                
                // Hapus kursor saat pindah ke baris teks berikutnya
                if (i < textData.length - 1) {
                    cursor.remove();
                    await new Promise(r => setTimeout(r, 400)); // jeda sebelum ngetik paragraf baru
                }
            }
        }

        // --- JAVASCRIPT UNTUK BUNGA ---
        function createFlower() {
            const flower = document.createElement('span');
            flower.className = 'flower';
            const flowers = ['🌸', '🏵️', '🌺', '🌻', '🍃', '💮'];
            flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];

            const startX = Math.random() * window.innerWidth;
            flower.style.left = `${startX}px`;

            const size = Math.random() * (25 - 10) + 10;
            flower.style.fontSize = `${size}px`;
            flower.style.opacity = Math.random() * (0.9 - 0.4) + 0.4;

            const duration = Math.random() * (12 - 6) + 6;
            flower.style.animationDuration = `${duration}s`;

            const delay = Math.random() * 5;
            flower.style.animationDelay = `${delay}s`;

            document.body.appendChild(flower);

            setTimeout(() => {
                flower.remove();
            }, (duration + delay) * 1000);
        }

        // Jalankan kedua fungsinya
        typeWriter();
        setInterval(createFlower, 400);
    </script>

</body>
</html>
